<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f0f0f0; }

    #app { display: flex; height: 100vh; overflow: hidden; }

    /* Left panel */
    #sidebar {
      width: 30%;
      min-width: 220px;
      background: #fff;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }
    #sidebar-header {
      background: #075e54;
      color: #fff;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #sidebar-header a { color: #a8e6cf; font-size: 13px; text-decoration: none; }
    #sidebar-header a:hover { text-decoration: underline; }
    #stage-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }
    .filter-btn {
      padding: 4px 10px;
      border: 1px solid #ccc;
      border-radius: 14px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn:hover { background: #f0f0f0; }
    .filter-btn.active { background: #075e54; color: #fff; border-color: #075e54; }
    .stage-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
      margin-left: 6px;
    }
    .stage-interested { background: #d5f5e3; color: #27ae60; }
    .stage-demo_requested { background: #fdebd0; color: #e67e22; }
    .stage-opted_out { background: #fde8e8; color: #c0392b; }
    .stage-auto_responder { background: #eaf0fb; color: #3498db; }
    .stage-replied { background: #e8e8fd; color: #6c5ce7; }
    .stage-contacted { background: #f0f0f0; color: #888; }
    .stage-cold { background: #f0f0f0; color: #aaa; }
    #contact-list {
      flex: 1;
      overflow-y: auto;
    }
    .contact-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .contact-item:hover, .contact-item.active {
      background: #f5f5f5;
    }
    .contact-item.active {
      background: #ebebeb;
    }
    .contact-phone {
      font-weight: 600;
      font-size: 14px;
      color: #111;
    }
    .contact-preview {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-time {
      font-size: 11px;
      color: #999;
      align-self: flex-end;
    }
    #loading-contacts {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    /* Right panel */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ece5dd;
    }
    #chat-header {
      background: #075e54;
      color: #fff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      min-height: 52px;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 15px;
    }
    .bubble-wrap {
      display: flex;
    }
    .bubble-wrap.sent { justify-content: flex-end; }
    .bubble-wrap.received { justify-content: flex-start; }
    .bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
      position: relative;
    }
    .bubble.sent {
      background: #dcf8c6;
      border-bottom-right-radius: 2px;
    }
    .bubble.received {
      background: #fff;
      border-bottom-left-radius: 2px;
    }
    .bubble-meta {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
      text-align: right;
    }
    .bubble.sent .bubble-meta { color: #555; }

    /* Input bar */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
    }
    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    #msg-input:focus { border-color: #075e54; }
    #send-btn {
      background: #075e54;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
    }
    #send-btn:hover { background: #054d44; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    #chat-panel.no-contact #chat-header { display: none; }
    #chat-panel.no-contact #input-bar { display: none; }
    #chat-panel.no-contact #chat-messages { display: none; }
  </style>
</head>
<body>
<div id="app">
  <!-- Left: contact list -->
  <div id="sidebar">
    <div id="sidebar-header">WhatsApp Viewer <span style="display:flex;gap:12px;"><a href="/dashboard">Dashboard →</a><a href="/logout">Logout</a></span></div>
    <div id="stage-filter">
      <button class="filter-btn active" data-stage="has_reply">Has Reply</button>
      <button class="filter-btn" data-stage="all">All</button>
      <button class="filter-btn" data-stage="interested">Interested</button>
      <button class="filter-btn" data-stage="demo_requested">Demo</button>
      <button class="filter-btn" data-stage="auto_responder">Auto-reply</button>
      <button class="filter-btn" data-stage="opted_out">Opted Out</button>
      <button class="filter-btn" data-stage="replied">Replied</button>
    </div>
    <div id="contact-list">
      <div id="loading-contacts">Loading conversations…</div>
    </div>
  </div>

  <!-- Right: chat -->
  <div id="chat-panel" class="no-contact">
    <div id="chat-header"></div>
    <div id="chat-messages"></div>
    <div id="empty-state">Select a contact to view messages</div>
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send-btn" title="Send">&#9658;</button>
    </div>
  </div>
</div>

<script>
  let currentPhone = null;
  let refreshTimer = null;
  let allConvos = {};
  let currentFilter = "has_reply";

  function apiUrl(path) {
    return path;
  }

  const STAGE_LABELS = {
    interested: "Interested", demo_requested: "Demo", opted_out: "Opt-out",
    auto_responder: "Auto-reply", replied: "Replied", contacted: "Contacted", cold: "Cold"
  };

  function formatTime(iso) {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleString("pt-PT", {
        timeZone: "Europe/Lisbon",
        day: "2-digit", month: "2-digit",
        hour: "2-digit", minute: "2-digit"
      });
    } catch (e) { return iso; }
  }

  function statusIcon(status) {
    const icons = { delivered: "✓✓", sent: "✓", read: "✓✓", failed: "✗", undelivered: "✗" };
    return icons[status] || "";
  }

  async function loadConversations() {
    try {
      const url = apiUrl(`/api/conversations?stage=${currentFilter}`);
      const res = await fetch(url);
      allConvos = await res.json();
      renderContactList(allConvos);
    } catch (e) {
      document.getElementById("loading-contacts").textContent = "Failed to load conversations.";
    }
  }

  function renderContactList(convos) {
    const list = document.getElementById("contact-list");
    list.innerHTML = "";
    const phones = Object.keys(convos);
    if (phones.length === 0) {
      list.innerHTML = '<div id="loading-contacts">No conversations found.</div>';
      return;
    }
    phones.forEach(phone => {
      const convo = convos[phone];
      const msgs = convo.messages || [];
      const last = msgs[msgs.length - 1];
      const stage = convo.stage || "cold";
      const item = document.createElement("div");
      item.className = "contact-item" + (phone === currentPhone ? " active" : "");
      item.dataset.phone = phone;
      const preview = last ? (last.body || (last.num_media > 0 ? "[Image]" : "")) : "";
      const time = last ? formatTime(last.time) : "";
      const badgeHtml = stage && stage !== "cold" && stage !== "contacted"
        ? `<span class="stage-badge stage-${escHtml(stage)}">${escHtml(STAGE_LABELS[stage] || stage)}</span>`
        : "";
      item.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <span class="contact-phone">${escHtml(phone)}${badgeHtml}</span>
          <span class="contact-time">${escHtml(time)}</span>
        </div>
        <span class="contact-preview">${escHtml(preview.slice(0, 60))}</span>
      `;
      item.addEventListener("click", () => selectContact(phone));
      list.appendChild(item);
    });
  }

  async function selectContact(phone) {
    currentPhone = phone;
    document.getElementById("chat-panel").classList.remove("no-contact");
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("chat-messages").style.display = "flex";
    document.getElementById("chat-header").textContent = phone;

    // Highlight active contact
    document.querySelectorAll(".contact-item").forEach(el => {
      el.classList.toggle("active", el.dataset.phone === phone);
    });

    await loadMessages(phone);

    // Auto-refresh every 30s
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => {
      if (currentPhone) loadMessages(currentPhone);
    }, 30000);
  }

  async function loadMessages(phone) {
    try {
      const res = await fetch(`/api/conversations/${encodeURIComponent(phone)}`);
      const msgs = await res.json();
      renderMessages(msgs);
    } catch (e) {
      console.error("Failed to load messages", e);
    }
  }

  function renderMessages(msgs) {
    const container = document.getElementById("chat-messages");
    container.innerHTML = "";
    msgs.forEach(msg => {
      const wrap = document.createElement("div");
      wrap.className = `bubble-wrap ${msg.direction}`;
      const bubble = document.createElement("div");
      bubble.className = `bubble ${msg.direction}`;

      let mediaHtml = "";
      if (msg.num_media > 0 && msg.media_urls && msg.media_urls.length > 0) {
        msg.media_urls.forEach(media => {
          if (media.content_type && media.content_type.startsWith("image/")) {
            mediaHtml += `<img src="${escHtml(media.url)}" style="max-width:100%;border-radius:6px;margin-bottom:4px;cursor:pointer;" onclick="window.open(this.src)" loading="lazy">`;
          } else {
            const typeLabel = media.content_type || "unknown";
            mediaHtml += `<span style="display:inline-block;background:#e0e0e0;color:#555;font-size:12px;padding:2px 8px;border-radius:4px;margin-bottom:4px;">[Media: ${escHtml(typeLabel)}]</span>`;
          }
        });
      } else if (msg.num_media > 0) {
        mediaHtml = `<span style="display:inline-block;background:#e0e0e0;color:#555;font-size:12px;padding:2px 8px;border-radius:4px;margin-bottom:4px;">[Media]</span>`;
      }

      const bodyHtml = msg.body ? escHtml(msg.body) : "";
      bubble.innerHTML = `
        ${mediaHtml}
        ${bodyHtml}
        <div class="bubble-meta">${escHtml(formatTime(msg.time))} ${msg.direction === "sent" ? escHtml(statusIcon(msg.status)) : ""}</div>
      `;
      wrap.appendChild(bubble);
      container.appendChild(wrap);
    });
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const btn = document.getElementById("send-btn");
    const body = input.value.trim();
    if (!body || !currentPhone) return;

    btn.disabled = true;
    try {
      const res = await fetch("/api/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ to: currentPhone, body })
      });
      const data = await res.json();
      if (data.error) {
        alert("Send failed: " + data.error);
      } else {
        input.value = "";
        await loadMessages(currentPhone);
        // Refresh contact list to update preview
        await loadConversations();
      }
    } catch (e) {
      alert("Network error sending message.");
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function escHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Event listeners
  document.getElementById("send-btn").addEventListener("click", sendMessage);
  document.getElementById("msg-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Stage filter buttons
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.stage;
      loadConversations();
    });
  });

  // Initial load
  loadConversations();
</script>
</body>
</html>
