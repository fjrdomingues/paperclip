<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f0f0f0; }

    #app { display: flex; height: 100vh; overflow: hidden; }

    /* Left panel */
    #sidebar {
      width: 30%;
      min-width: 220px;
      background: #fff;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }
    #sidebar-header {
      background: #075e54;
      color: #fff;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 600;
    }
    #contact-list {
      flex: 1;
      overflow-y: auto;
    }
    .contact-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .contact-item:hover, .contact-item.active {
      background: #f5f5f5;
    }
    .contact-item.active {
      background: #ebebeb;
    }
    .contact-phone {
      font-weight: 600;
      font-size: 14px;
      color: #111;
    }
    .contact-preview {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-time {
      font-size: 11px;
      color: #999;
      align-self: flex-end;
    }
    #loading-contacts {
      padding: 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    /* Right panel */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ece5dd;
    }
    #chat-header {
      background: #075e54;
      color: #fff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      min-height: 52px;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 15px;
    }
    .bubble-wrap {
      display: flex;
    }
    .bubble-wrap.sent { justify-content: flex-end; }
    .bubble-wrap.received { justify-content: flex-start; }
    .bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
      position: relative;
    }
    .bubble.sent {
      background: #dcf8c6;
      border-bottom-right-radius: 2px;
    }
    .bubble.received {
      background: #fff;
      border-bottom-left-radius: 2px;
    }
    .bubble-meta {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
      text-align: right;
    }
    .bubble.sent .bubble-meta { color: #555; }

    /* Input bar */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
    }
    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    #msg-input:focus { border-color: #075e54; }
    #send-btn {
      background: #075e54;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
    }
    #send-btn:hover { background: #054d44; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    #chat-panel.no-contact #chat-header { display: none; }
    #chat-panel.no-contact #input-bar { display: none; }
    #chat-panel.no-contact #chat-messages { display: none; }
  </style>
</head>
<body>
<div id="app">
  <!-- Left: contact list -->
  <div id="sidebar">
    <div id="sidebar-header">WhatsApp Viewer</div>
    <div id="contact-list">
      <div id="loading-contacts">Loading conversations…</div>
    </div>
  </div>

  <!-- Right: chat -->
  <div id="chat-panel" class="no-contact">
    <div id="chat-header"></div>
    <div id="chat-messages"></div>
    <div id="empty-state">Select a contact to view messages</div>
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send-btn" title="Send">&#9658;</button>
    </div>
  </div>
</div>

<script>
  const PW_PARAM = "{{ pw_param }}";
  let currentPhone = null;
  let refreshTimer = null;
  let allConvos = {};

  function apiUrl(path) {
    return path + (PW_PARAM ? (path.includes("?") ? "&" : "?") + PW_PARAM.slice(1) : "");
  }

  function formatTime(iso) {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleString("pt-PT", {
        timeZone: "Europe/Lisbon",
        day: "2-digit", month: "2-digit",
        hour: "2-digit", minute: "2-digit"
      });
    } catch (e) { return iso; }
  }

  function statusIcon(status) {
    const icons = { delivered: "✓✓", sent: "✓", read: "✓✓", failed: "✗", undelivered: "✗" };
    return icons[status] || "";
  }

  async function loadConversations() {
    try {
      const res = await fetch("/api/conversations");
      allConvos = await res.json();
      renderContactList(allConvos);
    } catch (e) {
      document.getElementById("loading-contacts").textContent = "Failed to load conversations.";
    }
  }

  function renderContactList(convos) {
    const list = document.getElementById("contact-list");
    list.innerHTML = "";
    const phones = Object.keys(convos);
    if (phones.length === 0) {
      list.innerHTML = '<div id="loading-contacts">No conversations found.</div>';
      return;
    }
    phones.forEach(phone => {
      const msgs = convos[phone].messages || [];
      const last = msgs[msgs.length - 1];
      const item = document.createElement("div");
      item.className = "contact-item" + (phone === currentPhone ? " active" : "");
      item.dataset.phone = phone;
      const preview = last ? last.body : "";
      const time = last ? formatTime(last.time) : "";
      item.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <span class="contact-phone">${escHtml(phone)}</span>
          <span class="contact-time">${escHtml(time)}</span>
        </div>
        <span class="contact-preview">${escHtml(preview.slice(0, 60))}</span>
      `;
      item.addEventListener("click", () => selectContact(phone));
      list.appendChild(item);
    });
  }

  async function selectContact(phone) {
    currentPhone = phone;
    document.getElementById("chat-panel").classList.remove("no-contact");
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("chat-messages").style.display = "flex";
    document.getElementById("chat-header").textContent = phone;

    // Highlight active contact
    document.querySelectorAll(".contact-item").forEach(el => {
      el.classList.toggle("active", el.dataset.phone === phone);
    });

    await loadMessages(phone);

    // Auto-refresh every 30s
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(() => {
      if (currentPhone) loadMessages(currentPhone);
    }, 30000);
  }

  async function loadMessages(phone) {
    try {
      const res = await fetch(`/api/conversations/${encodeURIComponent(phone)}`);
      const msgs = await res.json();
      renderMessages(msgs);
    } catch (e) {
      console.error("Failed to load messages", e);
    }
  }

  function renderMessages(msgs) {
    const container = document.getElementById("chat-messages");
    container.innerHTML = "";
    msgs.forEach(msg => {
      const wrap = document.createElement("div");
      wrap.className = `bubble-wrap ${msg.direction}`;
      const bubble = document.createElement("div");
      bubble.className = `bubble ${msg.direction}`;
      bubble.innerHTML = `
        ${escHtml(msg.body)}
        <div class="bubble-meta">${escHtml(formatTime(msg.time))} ${msg.direction === "sent" ? escHtml(statusIcon(msg.status)) : ""}</div>
      `;
      wrap.appendChild(bubble);
      container.appendChild(wrap);
    });
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const btn = document.getElementById("send-btn");
    const body = input.value.trim();
    if (!body || !currentPhone) return;

    btn.disabled = true;
    try {
      const res = await fetch("/api/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ to: currentPhone, body })
      });
      const data = await res.json();
      if (data.error) {
        alert("Send failed: " + data.error);
      } else {
        input.value = "";
        await loadMessages(currentPhone);
        // Refresh contact list to update preview
        await loadConversations();
      }
    } catch (e) {
      alert("Network error sending message.");
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function escHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Event listeners
  document.getElementById("send-btn").addEventListener("click", sendMessage);
  document.getElementById("msg-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Initial load
  loadConversations();
</script>
</body>
</html>
